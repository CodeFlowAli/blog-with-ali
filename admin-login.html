  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",

    "url": "https://blogwithali.example/admin-login.html",
    "description": "Frontend-only demo admin login page for Blog With Ali."

<body data-page="admin-login" class="admin-auth-page">
  <main class="admin-auth-wrap" id="mainContent">
    <section class="admin-auth-card" aria-labelledby="adminLoginTitle">
      <a class="logo auth-logo" href="index.html" aria-label="Back to Blog With Ali home">
        <span class="logo-mark"><i class="fa-solid fa-pen-nib" aria-hidden="true"></i></span>
        <span>Blog With Ali</span>
      </a>
      <p class="eyebrow"><i class="fa-solid fa-lock" aria-hidden="true"></i> Demo Admin Access</p>
      <h1 id="adminLoginTitle">Admin Login</h1>
      
      <form id="adminLoginForm" class="admin-login-form" novalidate>
        <div class="form-row">
          <label for="adminEmail">Email</label>
          <input id="adminEmail" name="email" type="email" placeholder="Enter Admin Email" autocomplete="username" required />
        </div>
        <div class="form-row">
          <label for="adminPassword">Password</label>
          <input id="adminPassword" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
        </div>
        <button class="btn btn-primary full-btn" type="submit"><i class="fa-solid fa-right-to-bracket" aria-hidden="true"></i> Login</button>
        <p class="form-message" role="status" aria-live="polite"></p>
      </form>
      <div class="demo-credentials" style="display: none;">
        <strong>Demo Login:</strong>
        <span>Email: admin@blogwithali.com</span>
        <span>Password: admin123</span>
      </div>
      <a class="auth-back-link" href="index.html"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to website</a>
    </section>
  </main>
  <script src="script.js" defer></script>
</body>
</html>
